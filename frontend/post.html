<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Detail | Newbreak Church Blog</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <div class="container nav-content">
            <a href="index.html" class="logo btn-back" id="mainLogo">
                <span class="logo-blog">Blog</span><span class="logo-sep">/</span><span class="logo-break">Break</span>
            </a>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <a href="admin.html" id="adminHeaderLink"
                    style="display: none; color: var(--primary); text-decoration: none; font-weight: 600; font-size: 0.9rem; padding: 0.5rem 1rem; border: 1.5px solid var(--primary); border-radius: 20px; transition: all 0.3s ease;"
                    onmouseover="this.style.background='var(--primary)'; this.style.color='#fff';"
                    onmouseout="this.style.background='transparent'; this.style.color='var(--primary)';">Admin Panel</a>
                <button class="button type1 btn-back" onclick="location.href='index.html'">
                    <span class="btn-txt">Go Back</span>
                </button>
            </div>
        </div>
    </header>
    <div class="reading-progress-container">
        <div id="readingProgress" class="reading-progress-bar"></div>
    </div>

    <main>
        <div id="postHeader"></div>
        <article id="postDetail" class="loading">
            Loading post content...
        </article>
        <div id="socialSharing" class="container"
            style="max-width: 900px; margin: 4rem auto; padding: 2rem 0; border-top: 1px solid #eee; display: flex; align-items: center; gap: 1.5rem;">
            <span
                style="font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--secondary);">Share
                this story:</span>
            <div style="display: flex; gap: 1.5rem; flex-wrap: wrap;">
                <!-- Facebook -->
                <button class="Btn" title="Share on Facebook" onclick="showToast('Shared to Facebook!')">
                    <span class="svgContainer">
                        <svg fill="white" viewBox="0 0 320 512" height="1.2em">
                            <path
                                d="M279.14 288l14.22-92.66h-88.91v-60.13c0-25.35 12.42-50.06 52.24-50.06h40.42V6.26S260.43 0 225.36 0c-73.22 0-121.08 44.38-121.08 124.72v70.62H22.89V288h81.39v224h100.17V288z">
                            </path>
                        </svg>
                    </span>
                    <span class="BG" style="background: #1877F2;"></span>
                </button>

                <!-- Twitter (X) -->
                <button class="Btn" title="Share on Twitter" onclick="showToast('Shared to Twitter!')">
                    <span class="svgContainer">
                        <svg fill="white" viewBox="0 0 512 512" height="1.2em">
                            <path
                                d="M389.2 48h70.6L305.6 224.2 487 464H345L233.7 318.6 106.5 464H35.8L200.7 275.5 26.8 48H172.4L272.9 180.9 389.2 48zM364.4 421.8h39.1L151.1 88h-42L364.4 421.8z">
                            </path>
                        </svg>
                    </span>
                    <span class="BG"></span>
                </button>

                <!-- Copy Link -->
                <button class="Btn" title="Copy Link"
                    onclick="navigator.clipboard.writeText(window.location.href); showToast('Link copied to clipboard!')">
                    <span class="svgContainer">
                        <svg fill="white" viewBox="0 0 640 512" height="1.2em">
                            <path
                                d="M579.8 267.7c56.5-56.5 56.5-148 0-204.5c-50-50-128.8-56.5-186.3-15.4l-1.6 1.1c-14.4 10.3-17.7 30.3-7.4 44.6s30.3 17.7 44.6 7.4l1.6-1.1c32.1-22.9 76-19.3 103.8 8.6c31.5 31.5 31.5 82.5 0 114L422.3 334.8c-31.5 31.5-82.5 31.5-114 0c-27.9-27.9-31.5-71.8-8.6-103.8l1.1-1.6c10.3-14.4 6.9-34.4-7.4-44.6s-34.4-6.9-44.6 7.4l-1.1 1.6C206.5 251.2 213 330 263 380c56.5 56.5 148 56.5 204.5 0L579.8 267.7zM60.2 244.3c-56.5 56.5-56.5 148 0 204.5c50 50 128.8 56.5 186.3 15.4l1.6-1.1c14.4-10.3 17.7-30.3 7.4-44.6s-30.3-17.7-44.6-7.4l-1.6 1.1c-32.1 22.9-76 19.3-103.8-8.6C74 372 74 321 105.5 289.5L217.7 177.2c31.5-31.5 82.5-31.5 114 0c27.9 27.9 31.5 71.8 8.6 103.8l-1.1 1.6c-10.3 14.4-6.9 34.4 7.4 44.6s34.4 6.9 44.6-7.4l1.1-1.6C433.5 260.8 427 182 377 132c-56.5-56.5-148-56.5-204.5 0L60.2 244.3z">
                            </path>
                        </svg>
                    </span>
                    <span class="BG" style="background: var(--accent);"></span>
                </button>
            </div>
        </div>
    </main>

    <footer
        style="padding: 4rem 0; text-align: center; background: #fff; border-top: 1px solid #eee; margin-top: 4rem;">
        <div class="container">
            <p>&copy; 2026 Newbreak Church. All rights reserved.</p>
        </div>
    </footer>

    <button id="backToTop" class="back-to-top" title="Back to Top">
        <svg viewBox="0 0 384 512" class="svg-icon">
            <path
                d="M214.6 41.4c-12.5-12.5-32.8-12.5-45.3 0l-160 160c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L160 141.2V448c0 17.7 14.3 32 32 32s32-14.3 32-32V141.2L329.4 246.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3l-160-160z">
            </path>
        </svg>
    </button>
    <script src="js/app.js"></script>
</body>

</html>

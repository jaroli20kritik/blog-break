<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Newbreak Blog</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --modal-bg: rgba(0, 0, 0, 0.7);
        }

        .admin-page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 3rem 0;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .admin-page-header h1 {
            font-size: clamp(2rem, 5vw, 2.5rem);
            margin: 0;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-bg);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: #fff;
            width: 100%;
            max-width: 700px;
            max-height: 85vh;
            border-radius: 20px;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            /* Contains the scrollbar */
            display: flex;
            flex-direction: column;
        }

        .modal-scrollable {
            padding: 2.5rem;
            overflow-y: auto;
            flex-grow: 1;
            /* Scrollbar only shown when needed */
            scrollbar-width: thin;
            scrollbar-color: #e5e7eb transparent;
        }

        /* Customize scrollbar appearance */
        .modal-scrollable::-webkit-scrollbar {
            width: 6px;
        }

        .modal-scrollable::-webkit-scrollbar-thumb {
            background: #e5e7eb;
            border-radius: 10px;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #f3f4f6;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            color: #4b5563;
            transition: all 0.2s;
        }

        .close-modal:hover {
            background: #e5e7eb;
            color: #111827;
        }

        /* Form styling inside modal */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--primary);
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #f3f4f6;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        /* Management Grid */
        .mgmt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 5rem;
        }

        .mgmt-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .mgmt-card:hover {
            transform: translateY(-5px);
        }

        .mgmt-img {
            height: 180px;
            width: 100%;
            object-fit: cover;
        }

        .mgmt-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .mgmt-content h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.2rem;
            line-height: 1.4;
        }

        .mgmt-meta {
            font-size: 0.8rem;
            color: #6b7280;
            margin-bottom: 1.5rem;
        }

        .mgmt-actions {
            display: flex;
            gap: 1rem;
            margin-top: auto;
        }

        .btn-create {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.8rem 1.5rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-create:hover {
            background: var(--accent);
            transform: scale(1.05);
        }

        .btn-delete-card {
            flex: 1;
            padding: 0.6rem;
            background: #fee2e2;
            color: #dc2626;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-delete-card:hover {
            background: #dc2626;
            color: #fff;
        }

        .btn-view-card {
            padding: 0.6rem 1rem;
            background: #f3f4f6;
            color: #374151;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            text-align: center;
        }

        /* Footer Nav Styling */
        .footer-nav-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .footer-nav-link {
            display: inline-flex;
            align-items: center;
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            padding-left: 0;
        }

        .footer-nav-link::before {
            content: '→';
            margin-right: 8px;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
            color: var(--accent);
        }

        .footer-nav-link:hover {
            color: #fff;
            padding-left: 10px;
        }

        .footer-nav-link:hover::before {
            opacity: 1;
            transform: translateX(0);
        }

        .footer-nav-link.active {
            color: var(--accent);
            font-weight: 700;
        }

        /* Responsive */
        .modal-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 640px) {
            .mgmt-grid {
                grid-template-columns: 1fr;
            }

            .modal-form-grid {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .modal-content {
                border-radius: 12px;
            }

            .modal-scrollable {
                padding: 1.5rem;
            }

            .admin-page-header {
                text-align: center;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <header id="mainHeader">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <span class="logo-blog">Blog</span><span class="logo-sep">/</span><span class="logo-break">Break</span>
            </a>
            <button class="button type1 btn-back"
                onclick="sessionStorage.removeItem('adminMode'); location.href='index.html'">
                <span class="btn-txt">Go Back</span>
            </button>
        </div>
    </header>

    <main class="container">
        <div class="admin-page-header reveal">
            <div>
                <h1 style="margin-bottom: 0.5rem;">Management</h1>
                <p style="color: var(--text-muted); font-weight: 500;">Welcome to your storytelling control center.</p>
            </div>
            <button class="btn-create" id="openModalBtn"
                style="border-radius: 30px; padding: 1rem 2rem; box-shadow: var(--shadow);">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    style="margin-right: 8px;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                Post Story
            </button>
        </div>

        <div class="mgmt-grid" id="mgmtGrid">
            <!-- Grid items will be injected here -->
        </div>
    </main>

    <!-- Modal Popup for Create Post -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content"
            style="background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);">
            <button class="close-modal" id="closeModalBtn" title="Close"
                style="background: rgba(0,0,0,0.05);">&times;</button>
            <div class="modal-scrollable">
                <h2 style="margin-bottom: 2.5rem; font-family: 'Outfit', sans-serif; font-size: 2rem;">New Story</h2>
                <form id="postForm">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" placeholder="Give it a powerful title..." required>
                    </div>

                    <div class="modal-form-grid">
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" name="category" required>
                                <option value="" disabled selected>Select category</option>
                                <option value="Faith">Faith</option>
                                <option value="Growth">Growth</option>
                                <option value="Community">Community</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="imageFile">Cover Image</label>
                            <input type="file" id="imageFile" name="imageFile" accept="image/*" required
                                style="padding: 0.6rem; background: #fff;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="summary">Summary</label>
                        <input type="text" id="summary" name="summary" placeholder="A short hook for the reader..."
                            required>
                    </div>

                    <div class="form-group">
                        <label for="content">The Story</label>
                        <textarea id="content" name="content" placeholder="Share your message..." required></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="button type1"
                        style="width: 100%; height: 56px; background: var(--primary); color: #fff; margin-top: 1rem;">
                        <span class="btn-txt">Publish Story</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <footer>
        <div class="container footer-content" style="justify-content: center; text-align: center;">
            <div class="footer-info" style="border: none; padding: 0; margin: 0; max-width: 600px;">
                <a href="index.html" class="logo" style="color: #fff;"><strong>B</strong>log <strong>B</strong>reak</a>
            </div>
        </div>
        <div class="container copyright center">
            &copy; 2026 Newbreak Church. All rights reserved.
        </div>
    </footer>

    <script>
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5041/api'
            : 'https://blog-break-api.onrender.com/api';
        const BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5041'
            : 'https://blog-break-api.onrender.com';

        // Modal Logic
        const modal = document.getElementById('modalOverlay');
        const openBtn = document.getElementById('openModalBtn');
        const closeBtn = document.getElementById('closeModalBtn');

        openBtn.onclick = () => {
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        };

        const closeModal = () => {
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        };

        closeBtn.onclick = closeModal;
        window.onclick = (e) => { if (e.target == modal) closeModal(); };

        // Image Resolver
        function resolveImageUrl(url) {
            if (!url) return 'https://via.placeholder.com/400x300';
            if (url.startsWith('http')) return url;
            return `${BASE_URL}${url}`;
        }

        // Fetch & Render Grid
        async function fetchMgmtPosts() {
            try {
                const response = await fetch(`${API_URL}/posts`);
                const posts = await response.json();
                renderMgmtGrid(posts);
            } catch (err) {
                console.error('Fetch error:', err);
            }
        }

        function renderMgmtGrid(posts) {
            const grid = document.getElementById('mgmtGrid');
            if (posts.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #666;">No posts found. Create your first one!</p>';
                return;
            }
            grid.innerHTML = posts.map(post => `
                <div class="mgmt-card reveal">
                    <img class="mgmt-img" src="${resolveImageUrl(post.imageUrl)}" alt="">
                    <div class="mgmt-content" style="background: var(--glass); border-top: 1px solid var(--glass-border);">
                        <span class="post-category" style="background: rgba(251, 113, 133, 0.1); color: var(--accent); padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.7rem; font-weight: 700; width: fit-content; margin-bottom: 1rem;">${post.category}</span>
                        <h3 style="font-size: 1.25rem; font-weight: 700; color: var(--primary); margin-bottom: 0.5rem;">${post.title}</h3>
                        <p class="mgmt-meta" style="font-weight: 500; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem;">${new Date(post.publishedDate).toLocaleDateString()}</p>
                        <div class="mgmt-actions">
                            <a href="post.html?id=${post.id}" class="btn-view-card" style="border-radius: 8px; font-weight: 700;">View</a>
                            <button class="btn-delete-card" onclick="deletePost(${post.id})" style="border-radius: 8px; font-weight: 700;">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');

            // Re-trigger reveal
            initReveal();
        }

        // Create Post
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.querySelector('.btn-txt').innerText = 'Publishing...';
            btn.disabled = true;

            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('summary', document.getElementById('summary').value);
            formData.append('content', document.getElementById('content').value);
            const file = document.getElementById('imageFile').files[0];
            if (file) formData.append('imageFile', file);

            try {
                const response = await fetch(`${API_URL}/posts`, {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    alert('Story Published! ✨');
                    closeModal();
                    document.getElementById('postForm').reset();
                    fetchMgmtPosts();
                } else {
                    const errorText = await response.text();
                    console.error('Server error:', errorText);
                    alert(`Publishing failed: ${errorText || response.statusText}`);
                }
            } catch (err) {
                console.error('Fetch error:', err);
                alert(`Connection error: ${err.message}. Make sure your API is awake and CORS is allowed.`);
            } finally {
                btn.querySelector('.btn-txt').innerText = 'Publish Now';
                btn.disabled = false;
            }
        });

        // Delete Post
        async function deletePost(id) {
            if (!confirm('Are you sure you want to remove this story?')) return;
            try {
                const response = await fetch(`${API_URL}/posts/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    fetchMgmtPosts();
                }
            } catch (err) { alert('Error deleting.'); }
        }

        // Reveal Animation
        function initReveal() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('reveal-show');
                    }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        // Init
        fetchMgmtPosts();
        initReveal();
    </script>
</body>

</html>
